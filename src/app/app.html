<div class="container">
  <div class="header">
    <h1 class="title">{{planner.title}}</h1>
    <h3 class="titleUnderLay">
      @for(split of planner.subtitle.splits; track split){
      <span>{{split}}</span>
      }
    </h3>
  </div>
  <div class="intensitySelector">
    <button class="btn basicBtn" [class.active]="selectedIntensity === 'Basic'"
      (click)="selectIntermediate('Basic')">Basic</button>
    <button class="btn intermediateBtn" [class.active]="selectedIntensity === 'Intermediate'"
      (click)="selectIntermediate('Intermediate')">Intermediate</button>
    <button class="btn advancedBtn" [class.active]="selectedIntensity === 'Advanced'"
      (click)="selectIntermediate('Advanced')">Advanced</button>
  </div>
  <div class="body">
    <mat-tab-group mat-stretch-tabs="true" mat-align-tabs="center">
      @for (data of planner.days; track data.day) {
      <mat-tab [label]="data.day">
        <span class="contentHeader">
          <span class="contentHeaderWrapper">
            {{ data.label }} <span class="focus">{{ data.focus }}</span>
          </span>
        </span>
        <div class="contentBody">
          <table mat-table [dataSource]="getFilteredExercises(data.exercises)" class="mat-elevation-z8"
            multiTemplateDataRows>

            <ng-container matColumnDef="exercise">
              <th mat-header-cell *matHeaderCellDef> Exercise </th>
              <td mat-cell *matCellDef="let row"> {{row.name}} </td>
            </ng-container>

            <ng-container matColumnDef="sets">
              <th mat-header-cell *matHeaderCellDef> Sets </th>
              <td mat-cell *matCellDef="let row"> {{row.sets}} </td>
            </ng-container>

            <ng-container matColumnDef="reps">
              <th mat-header-cell *matHeaderCellDef> Reps </th>
              <td mat-cell *matCellDef="let row"> {{row.reps}} </td>
            </ng-container>

            <ng-container matColumnDef="rest">
              <th mat-header-cell *matHeaderCellDef> Rest </th>
              <td mat-cell *matCellDef="let row"> {{row.rest}} </td>
            </ng-container>

            <ng-container matColumnDef="type">
              <th mat-header-cell *matHeaderCellDef> Type </th>
              <td mat-cell *matCellDef="let row"> {{row.type}} </td>
            </ng-container>

            <ng-container matColumnDef="expandedDetail">
              <td mat-cell *matCellDef="let row" [attr.colspan]="displayedColumns.length">
                {{row.note}}
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.expanded-row]="isExpanded(row)"
              (click)="toggle(row)" [class.compound-row]="row.type === 'Compound'"
              [class.isolation-row]="row.type === 'Isolation'">
            </tr>
            <tr mat-row *matRowDef="let row; columns: ['expandedDetail']; when: isExpandedRow"
              class="expanded-row-detail">
            </tr>
          </table>
        </div>
      </mat-tab>
      }
    </mat-tab-group>
  </div>

  <router-outlet></router-outlet>
