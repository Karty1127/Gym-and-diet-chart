<div class="container">
  <div class="header">
    <h1 class="title">6-DAY GYM PLAN</h1>
    <h3 class="titleUnderLay">
      <span>Push/Pull * 2</span>
      <span>Shoulder *1</span>
      <span>Legs*1</span>
    </h3>
  </div>
  <div class="body">
    <mat-tab-group mat-stretch-tabs="true" mat-align-tabs="center">
      @for (data of GymData; track data.day) {
      <mat-tab [label]="data.day">
        <span class="contentHeader">
          <span class="contentHeaderWrapper">
            {{ data.label }} <span class="focus">{{ data.focus }}</span>
          </span>
        </span>
        <div class="contentBody">
          <table mat-table [dataSource]="data.exercises" class="mat-elevation-z8">

            <ng-container matColumnDef="exercise">
              <th mat-header-cell *matHeaderCellDef> Exercise </th>
              <td mat-cell *matCellDef="let row"> {{row.name}} </td>
            </ng-container>

            <ng-container matColumnDef="sets">
              <th mat-header-cell *matHeaderCellDef> Sets </th>
              <td mat-cell *matCellDef="let row"> {{row.sets}} </td>
            </ng-container>

            <ng-container matColumnDef="reps">
              <th mat-header-cell *matHeaderCellDef> Reps </th>
              <td mat-cell *matCellDef="let row"> {{row.reps}} </td>
            </ng-container>

            <ng-container matColumnDef="rest">
              <th mat-header-cell *matHeaderCellDef> Rest </th>
              <td mat-cell *matCellDef="let row"> {{row.rest}} </td>
            </ng-container>

            <ng-container matColumnDef="type">
              <th mat-header-cell *matHeaderCellDef> Type </th>
              <td mat-cell *matCellDef="let row"> {{row.type}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.compound-row]="row.type === 'Compound'"
              [class.isolation-row]="row.type === 'Isolation'">
            </tr>
          </table>
        </div>
      </mat-tab>
      }
    </mat-tab-group>
  </div>

  <router-outlet></router-outlet>
